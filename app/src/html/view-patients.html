<!DOCTYPE html>
<html lang="en">
<head>
<script>
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark-mode');
        document.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('dark-mode');
        });
    }
</script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Patients Database - Organ Donation Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <link href="../css/bootstrap.css" rel="stylesheet" />
    <link href="../css/fontawesome-all.css" rel="stylesheet" />
    <link rel="icon" href="../images/app-logo.png" />
    <link href="../css/styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .lang-switch {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--primary-teal);

            font-weight: 600;

                    <option value="en">English</option>

                <a href="../index.html" class="btn-homepage" style="font-size: 14px; padding: 8px 15px;" style="font-size: 14px; padding: 8px 15px;" data-i18n="back_to_dashboard">Back to Dashboard</a>

                <div class="row justify-content-center">

                    </div>
